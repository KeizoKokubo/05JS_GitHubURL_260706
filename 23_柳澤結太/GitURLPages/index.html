<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームへ移動中 / Redirecting to Game</title>
    <!-- Meta refresh for fallback redirection after 2 seconds -->
    <meta http-equiv="refresh" content="2;url=https://yutayanagisawa2502046.github.io/myGame_HTML/Index.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0a0f1d;
            --bg-end: #070a13;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 50%, var(--bg-start), var(--bg-end));
            background-color: var(--bg-end);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Decorative background glow */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 480px;
            width: 90%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Spinner Design */
        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem auto;
        }

        .spinner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .spinner-inner {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-bottom-color: #a5b4fc;
            animation: spin-reverse 1.5s linear infinite;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-redirect {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-redirect:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.45);
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
        }

        .btn-redirect:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            to { transform: rotate(-360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
        </div>
        
        <h1 class="title">ゲームへ移動しています</h1>
        <p class="subtitle">自動的にゲームのページへ遷移します。<br>画面が切り替わらない場合は、下のボタンを押してください。</p>
        
        <a id="redirect-link" href="https://yutayanagisawa2502046.github.io/myGame_HTML/Index.html" class="btn-redirect">
            ゲームを開く
        </a>
        
        <div class="footer">
            Redirecting to myGame...
        </div>
    </div>

    <script>
        // Redirect using JavaScript for speed, with a slight delay to allow transition animations
        setTimeout(function() {
            window.location.href = "https://yutayanagisawa2502046.github.io/myGame_HTML/Index.html";
        }, 1200);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER FEVER 3D - Portal</title>
  <!-- 自動リダイレクト (3秒後にゲームへ) -->
  <meta http-equiv="refresh" content="3;url=https://eikichitanaka.github.io/HTMMMML/index.html">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050409;
      --cyan-neon: #00f0ff;
      --gold-neon: #ffd700;
      --font-title: 'Orbitron', sans-serif;
      --font-body: 'Noto Sans JP', sans-serif;
    }
    body {
      background-color: var(--bg-color);
      color: #ffffff;
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(20, 10, 45, 0.6) 0%, transparent 80%),
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
    }
    .portal-card {
      background: rgba(13, 12, 21, 0.85);
      border: 2px solid var(--cyan-neon);
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.35);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      backdrop-filter: blur(8px);
    }
    h1 {
      font-family: var(--font-title);
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      background: linear-gradient(to bottom, #ffffff, var(--cyan-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
      letter-spacing: 2px;
    }
    p {
      color: #a0a5c5;
      font-size: 1rem;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }
    .btn-launch {
      display: inline-block;
      font-family: var(--font-title);
      font-size: 1.25rem;
      font-weight: 900;
      color: #ffffff;
      text-decoration: none;
      background: transparent;
      border: 2px solid var(--gold-neon);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      border-radius: 30px;
      padding: 15px 40px;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 2px;
      animation: pulse 1.5s infinite alternate;
    }
    .btn-launch:hover {
      background: var(--gold-neon);
      color: #000000;
      box-shadow: 0 0 30px var(--gold-neon);
      transform: scale(1.05);
    }
    .redirect-notice {
      font-size: 0.85rem;
      color: #707595;
      margin-top: 25px;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); border-color: rgba(255, 215, 0, 0.6); }
      100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); border-color: rgba(255, 215, 0, 1.0); }
    }
  </style>
</head>
<body>

  <div class="portal-card">
    <h1>CYBER FEVER 3D</h1>
    <p>3Dシューティングとパチスロ目押しが融合した、究極のブラウザスロットFPS。</p>
    
    <a href="https://eikichitanaka.github.io/HTMMMML/index.html" class="btn-launch">LAUNCH GAME</a>
    
    <div class="redirect-notice">
      ※クリックするか、3秒後に自動でゲーム公開ページへ遷移します。
    </div>
  </div>

</body>
</html>
